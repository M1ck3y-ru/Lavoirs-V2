<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavoirs V2 — Lavoirs à proximité</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💧</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <img id="logo" src="le-lavoir.png" alt="Le Lavoir">
    <h1>Lavoirs à proximité</h1>

    <div id="status-banner" class="status status-loading" role="status">Initialisation…</div>

    <div id="controls">
      <label for="radius-select">Rayon de recherche</label>
      <select id="radius-select">
        <option value="2000">2 km</option>
        <option value="5000">5 km</option>
        <option value="10000" selected>10 km</option>
        <option value="20000">20 km</option>
        <option value="30000">30 km</option>
      </select>
      <button id="btn-manual-mode" type="button">Définir une position manuellement</button>
    </div>

    <div id="lavoir-detail" class="hidden"></div>

    <ul id="lavoir-list"></ul>
  </aside>

  <main id="map">
    <div id="route-summary" class="hidden"></div>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="app.js"></script>
</body>
</html>
